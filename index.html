<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buscador de Fotos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #333; }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  button { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #333; color: #fff; }
  .btn-secondary { background: #fff; color: #333; border: 1px solid #ddd; }
  .btn-sql { background: #22c55e; color: #fff; }
  .btn-sql:disabled { opacity: 0.4; cursor: not-allowed; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { padding: 5px 14px; border-radius: 999px; border: 1.5px solid #ddd; background: #fff; font-size: 12px; cursor: pointer; font-weight: 500; }
  .filter-btn.active { background: #333; color: #fff; border-color: #333; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; }
  .card.selected { border: 2.5px solid #22c55e; }
  .card img { width: 100%; height: 130px; object-fit: cover; display: block; cursor: pointer; }
  .card-placeholder { width: 100%; height: 130px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .card-body { padding: 10px; }
  .card-name { font-size: 12px; font-weight: 600; color: #333; margin-bottom: 4px; }
  .card-cat { font-size: 11px; color: #888; margin-bottom: 8px; }
  .card-actions { display: flex; gap: 6px; }
  .btn-search { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 11px; cursor: pointer; font-weight: 500; }
  .thumb-row { display: flex; gap: 4px; padding: 6px 8px 0; overflow-x: auto; }
  .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
  .thumb.active { border-color: #333; }
  .btn-select { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; }
  .btn-select.selected { background: #22c55e; color: #fff; border-color: #22c55e; }
  .sql-area { background: #1e1e1e; color: #a8ff78; border-radius: 12px; padding: 16px; font-family: monospace; font-size: 11px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; margin-top: 16px; }
  .status { font-size: 12px; color: #666; margin-bottom: 8px; }
  .progress { font-size: 13px; color: #333; background: #fff; border-radius: 8px; padding: 10px 14px; border: 1px solid #e0e0e0; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<div class="controls">

  <button class="btn-secondary" onclick="deselecionarTodos()">✕ Desselecionar todos</button>
  <button class="btn-sql" id="btn-sql" onclick="gerarSQL()" disabled>📋 Gerar SQL</button>
</div>

<div class="filters" id="filters"></div>
<div class="progress" id="progress"></div>
<div class="status" id="status"></div>
<div class="grid" id="grid"></div>
<div class="sql-area" id="sql-area" style="display:none;"></div>

  {id:"4e552ffc-2eda-4e1c-ab25-dc817f2ef9a8",nome:"Suco de Laranja Natural",categoria:"sucos"},
  {id:"b2a79414-8324-4afa-8b9e-2bf2f96fc63b",nome:"Suco de Limão",categoria:"sucos"},
  {id:"c5cb9f23-c732-4084-886c-aec3338e0535",nome:"Suco de Manga",categoria:"sucos"},
  {id:"60af465c-b038-417b-bc87-40ea310c9f2d",nome:"Suco de Maracujá",categoria:"sucos"},
  {id:"806913a1-eefc-482d-abf6-347821934788",nome:"Suco de Morango",categoria:"sucos"},
];

const estado = {};
produtos.forEach(p => { estado[p.id] = { fotos: [], selecionada: null, escolhido: false }; });

let filtroAtivo = 'todos';

function getCategorias() {
  return ['todos', ...new Set(produtos.map(p => p.categoria))];
}

function renderFiltros() {
  document.getElementById('filters').innerHTML = getCategorias().map(c =>
    `<button class="filter-btn ${c === filtroAtivo ? 'active' : ''}" onclick="setFiltro('${c}')">${c}</button>`
  ).join('');
}

function setFiltro(cat) {
  filtroAtivo = cat;
  renderFiltros();
  renderGrid();
}

function produtosFiltrados() {
  return filtroAtivo === 'todos' ? produtos : produtos.filter(p => p.categoria === filtroAtivo);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = produtosFiltrados().map(p => {
    const e = estado[p.id];
    return `
      <div class="card ${e.escolhido ? 'selected' : ''}" id="card-${p.id}">
        ${e.selecionada
          ? `<img src="${e.selecionada}" onclick="proximaFoto('${p.id}')" title="Clique para trocar foto" />`
          : `<div class="card-placeholder">🍽️</div>`}
        ${e.fotos.length > 1 ? `
        <div class="thumb-row">
          ${e.fotos.map(f => `<img class="thumb ${f === e.selecionada ? 'active' : ''}" src="${f}" onclick="selecionarFoto('${p.id}','${f}')" />`).join('')}
        </div>` : ''}
        <div class="card-body">
          <div class="card-name">${p.nome}</div>
          <div class="card-cat">${p.categoria}</div>
          <div class="card-actions">
            <button class="btn-search" onclick="buscarFoto('${p.id}')">🔍 Buscar</button>
            <button class="btn-select ${e.escolhido ? 'selected' : ''}" onclick="toggleEscolhido('${p.id}')">${e.escolhido ? '✓' : '+'}</button>
          </div>
        </div>
      </div>`;
  }).join('');
  atualizarStatus();
}

function proximaFoto(id) {
  const e = estado[id];
  if (e.fotos.length <= 1) return;
  const idx = e.fotos.indexOf(e.selecionada);
  e.selecionada = e.fotos[(idx + 1) % e.fotos.length];
  renderGrid();
}

function selecionarFoto(id, url) {
  estado[id].selecionada = url;
  renderGrid();
}

function toggleEscolhido(id) {
  if (!estado[id].selecionada) return;
  estado[id].escolhido = !estado[id].escolhido;
  atualizarBtnSQL();
  renderGrid();
}

function atualizarStatus() {
  const comFoto = produtos.filter(p => estado[p.id].selecionada).length;
  const sel = produtos.filter(p => estado[p.id].escolhido).length;
  document.getElementById('status').textContent = `${comFoto} com foto | ${sel} selecionados para SQL`;
}

function atualizarBtnSQL() {
  document.getElementById('btn-sql').disabled = !produtos.some(p => estado[p.id].escolhido);
}

async function buscarFoto(id) {
  const p = produtos.find(x => x.id === id);
  const query = encodeURIComponent(p.nome + ' food');
  try {
    const resp = await fetch(`${PROXY}/buscar?q=${query}`);
    const data = await resp.json();
    if (data.results && data.results.length > 0) {
      estado[id].fotos = data.results.map(r => r.urls.small);
      estado[id].selecionada = estado[id].fotos[0];
      estado[id].escolhido = true;
    }
  } catch(e) { console.error('Erro:', e); }
  atualizarBtnSQL();
  renderGrid();
}

async function buscarTodos() {
  const lista = produtosFiltrados();
  const prog = document.getElementById('progress');
  prog.style.display = 'block';
  for (let i = 0; i < lista.length; i++) {
    prog.textContent = `🔍 Buscando ${i+1}/${lista.length}: ${lista[i].nome}...`;
    await buscarFoto(lista[i].id);
    await new Promise(r => setTimeout(r, 400));
  }
  prog.textContent = `✅ Concluído!`;
  setTimeout(() => prog.style.display = 'none', 3000);
}

function selecionarTodos() {
  produtosFiltrados().forEach(p => { if (estado[p.id].selecionada) estado[p.id].escolhido = true; });
  atualizarBtnSQL();
  renderGrid();
}

function deselecionarTodos() {
  produtosFiltrados().forEach(p => { estado[p.id].escolhido = false; });
  atualizarBtnSQL();
  renderGrid();
}

function gerarSQL() {
  const sel = produtos.filter(p => estado[p.id].escolhido && estado[p.id].selecionada);
  const sql = sel.map(p => `UPDATE cardapio SET foto_url = '${estado[p.id].selecionada}' WHERE id = '${p.id}';`).join('\n');
  const area = document.getElementById('sql-area');
  area.style.display = 'block';
  area.textContent = sql;
  navigator.clipboard.writeText(sql).catch(() => {});
}

renderFiltros();
renderGrid();
</script>
</body>
</html>
